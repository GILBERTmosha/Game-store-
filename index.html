<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manul Store Pro - Kingston</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(to right, #a855f7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden { display: none; }
        .active-tab { border-bottom: 2px solid #a855f7; color: #a855f7; font-weight: bold; }
    </style>
</head>
<body>

    <section id="authPages" class="flex flex-col items-center justify-center min-h-screen p-5">
        <div id="loginBox" class="glass p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-3xl font-bold mb-6 text-center gradient-text">Manul Store Login</h2>
            <div class="space-y-4">
                <input type="email" id="logEmail" placeholder="Barua Pepe" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none">
                <input type="password" id="logPass" placeholder="Nenosiri" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 p-3 rounded-xl font-bold">Ingia</button>
            </div>
            <p class="mt-4 text-center text-sm">Huna akaunti? <button onclick="toggleAuth()" class="text-blue-400">Jisajili</button></p>
        </div>

        <div id="regBox" class="hidden glass p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-3xl font-bold mb-6 text-center gradient-text">Jisajili</h2>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="Jina Kamili" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none">
                <input type="email" id="regEmail" placeholder="Barua Pepe" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none">
                <input type="password" id="regPass" placeholder="Nenosiri" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none">
                <button onclick="handleRegister()" class="w-full bg-purple-600 p-3 rounded-xl font-bold">Tengeneza Akaunti</button>
            </div>
            <button onclick="toggleAuth()" class="mt-4 text-sm text-gray-400">Rudi Login</button>
        </div>
    </section>

    <main id="dashboard" class="hidden min-h-screen">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="font-bold text-xl gradient-text">ManulOfficial</div>
            <div class="flex space-x-4 text-[10px] uppercase font-bold">
                <button onclick="switchTab('home')" id="tab-home" class="active-tab">Home</button>
                <button onclick="switchTab('store')" id="tab-store">Store</button>
                <button id="adminBtn" onclick="switchTab('admin')" class="hidden text-orange-400">Admin Panel</button>
                <button onclick="location.reload()" class="text-red-400">Logout</button>
            </div>
        </nav>

        <section id="content-store" class="hidden p-6">
            <div id="gameList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="content-admin" class="hidden p-6">
            <div class="glass p-6 rounded-2xl max-w-xl mx-auto space-y-4 border border-orange-500/30">
                <h2 id="adminTitle" class="text-xl font-bold text-orange-400">Post/Edit Game</h2>
                <input type="hidden" id="editId">
                <input type="text" id="gameTitle" placeholder="Jina la Game" class="w-full bg-gray-900 p-3 rounded-xl border border-gray-700">
                <input type="text" id="gamePrice" placeholder="Bei (Tsh)" class="w-full bg-gray-900 p-3 rounded-xl border border-gray-700">
                
                <div class="p-3 bg-purple-900/20 rounded-xl border border-purple-500/30">
                    <p class="text-xs text-purple-300 mb-2 font-bold">1. SEHEMU YA PICHA</p>
                    <input type="text" id="gameImg" placeholder="Link ya Picha (ImgBB URL)" class="w-full bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none focus:ring-1 ring-purple-500">
                </div>

                <div class="p-3 bg-blue-900/20 rounded-xl border border-blue-500/30">
                    <p class="text-xs text-blue-300 mb-2 font-bold">2. SEHEMU YA LINK (DOWNLOAD)</p>
                    <input type="text" id="gameLink" placeholder="Link ya Game (Mediafire/Drive)" class="w-full bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none focus:ring-1 ring-blue-500">
                </div>

                <textarea id="gameDesc" placeholder="Maelezo..." class="w-full bg-gray-900 p-3 rounded-xl border border-gray-700 h-20"></textarea>
                <button onclick="uploadGame()" id="saveBtn" class="w-full bg-orange-600 p-3 rounded-xl font-bold">HIFADHI GAME</button>
            </div>
        </section>

        <section id="content-home" class="p-6 text-center">
            <h1 class="text-2xl font-bold mt-10">Karibu Manul Store!</h1>
            <p class="text-gray-400 mt-2">Chagua game lako, lipia, na upate link ya download papo hapo.</p>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDu6sdbL4l8pbycSdSm0qHm_ndGz3FrWbY",
            authDomain: "kingston-bb437.firebaseapp.com",
            projectId: "kingston-bb437",
            storageBucket: "kingston-bb437.firebasestorage.app",
            messagingSenderId: "317220698974",
            appId: "1:317220698974:web:76bfe0d6f0fcb2327a6dcf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMINS = ['amanimosha724@gmail.com', 'kingshamo47@gmail.com'];
        let isAdmin = false;

        window.handleLogin = async () => {
            const email = document.getElementById('logEmail').value.trim();
            const pass = document.getElementById('logPass').value;
            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                isAdmin = ADMINS.includes(email.toLowerCase());
                if(isAdmin) document.getElementById('adminBtn').classList.remove('hidden');
                document.getElementById('authPages').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadGames();
            } catch (e) { alert("Error!"); }
        };

        window.uploadGame = async () => {
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('gameTitle').value,
                price: document.getElementById('gamePrice').value,
                img: document.getElementById('gameImg').value,
                link: document.getElementById('gameLink').value,
                desc: document.getElementById('gameDesc').value,
                date: new Date()
            };

            try {
                if(id) {
                    await updateDoc(doc(db, "games", id), data);
                    alert("Imebadilishwa!");
                } else {
                    await addDoc(collection(db, "games"), data);
                    alert("Imepostiwa!");
                }
                location.reload();
            } catch (e) { alert("Imefeli!"); }
        };

        window.loadGames = async () => {
            const q = query(collection(db, "games"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('gameList');
            list.innerHTML = "";
            snap.forEach(d => {
                const g = d.data();
                const id = d.id;
                list.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex flex-col space-y-3 border border-white/5">
                        <img src="${g.img}" class="w-full h-44 object-cover rounded-xl shadow-lg">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-blue-300">${g.title}</h3>
                                <p class="text-green-400 font-bold">${g.price}</p>
                            </div>
                            ${isAdmin ? `
                                <div class="flex gap-2">
                                    <button onclick="editGame('${id}')" class="text-orange-400 text-xs"><i class="fas fa-edit"></i></button>
                                    <button onclick="deleteGame('${id}')" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button>
                                </div>
                            ` : ''}
                        </div>
                        <p class="text-[10px] text-gray-500">${g.desc}</p>
                        
                        <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                            <button onclick="verifyPay('${id}', '${g.link}')" class="w-full bg-purple-600 py-2 rounded-lg text-xs font-bold uppercase">Verify Payment to Download</button>
                            <div id="download-${id}" class="hidden mt-2 text-center">
                                <a href="${g.link}" target="_blank" class="text-blue-400 underline text-xs font-bold">BONYEZA HAPA KU-DOWNLOAD</a>
                            </div>
                        </div>
                    </div>`;
            });
        };

        window.verifyPay = (id, link) => {
            let picha = prompt("Tafadhali weka 'Namba ya Muamala' au 'Jina la Aliyetuma' ili kuthibitisha malipo:");
            if(picha) {
                alert("Malipo yanahakikiwa... Link imefunguliwa!");
                document.getElementById('download-'+id).classList.remove('hidden');
            }
        };

        window.editGame = async (id) => {
            const docRef = await getDoc(doc(db, "games", id));
            const g = docRef.data();
            document.getElementById('gameTitle').value = g.title;
            document.getElementById('gamePrice').value = g.price;
            document.getElementById('gameImg').value = g.img;
            document.getElementById('gameLink').value = g.link;
            document.getElementById('gameDesc').value = g.desc;
            document.getElementById('editId').value = id;
            document.getElementById('adminTitle').innerText = "Edit Game: " + g.title;
            document.getElementById('saveBtn').innerText = "UPDATE GAME";
            switchTab('admin');
        };

        window.deleteGame = async (id) => {
            if(confirm("Una uhakika unataka kufuta kabisa game hili?")) {
                await deleteDoc(doc(db, "games", id));
                alert("Limefutwa!");
                loadGames();
            }
        };

        window.switchTab = (tab) => {
            ['home', 'store', 'admin'].forEach(t => document.getElementById('content-' + t).classList.add('hidden'));
            document.getElementById('content-' + tab).classList.remove('hidden');
            ['home', 'store', 'admin'].forEach(t => document.getElementById('tab-' + t)?.classList.remove('active-tab'));
            document.getElementById('tab-' + tab)?.classList.add('active-tab');
        };

        window.toggleAuth = () => {
            document.getElementById('loginBox').classList.toggle('hidden');
            document.getElementById('regBox').classList.toggle('hidden');
        };

        window.handleRegister = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", userCred.user.uid), { fullName: name, email: email, role: 'user' });
                alert("Hongera! Jisajili kisha Login.");
                toggleAuth();
            } catch (e) { alert("Email tayari ipo au nenosiri ni fupi!"); }
        };
    </script>
</body>
</html>
